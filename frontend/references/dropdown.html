<!--
  Source: https://blog.logrocket.com/creating-custom-select-dropdown-css/ 
  
  This html file is a self-contained custom dropdown. I'm leaving this here for current and future reference.
-->

<!DOCTYPE html>
<html>

<head>
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet" />
  <style>
    .custom-select {
      min-width: 350px;
      position: relative; /* Creates a positioning context for the arrow pseudo‑elements */
    }

    .custom-select select {
      appearance: none; /* Removes the browser/OS default dropdown arrow */
      width: 100%;
      font-size: 1.15rem;
      padding: 0.675em 6em 0.675em 1em; /* Extra right padding to make room for the fake arrow */
      background-color: #fff;
      border: 1px solid #caced1;
      border-radius: 0.25rem;
      color: #000;
      cursor: pointer;
    }

    /* Pseudo‑elements used to draw the custom dropdown arrow */
    .custom-select::before,
    .custom-select::after {
      --size: 0.3rem; /* CSS variable used for triangle size */
      content: ""; /* Required for pseudo‑elements to appear */
      position: absolute; /* Positions arrow relative to .custom-select */
      right: 1rem; /* Places arrow 1rem from the right edge */
      pointer-events: none; /* Makes arrow ignore mouse clicks */
    }

    /* Upper triangle (arrow pointing up) */
    .custom-select::before {
      border-left: var(--size) solid transparent;
      border-right: var(--size) solid transparent;
      border-bottom: var(--size) solid black; /* Bottom border creates upward triangle */
      top: 40%; /* Vertical position inside the wrapper */
    }

    /* Lower triangle (arrow pointing down) */
    .custom-select::after {
      border-left: var(--size) solid transparent;
      border-right: var(--size) solid transparent;
      border-top: var(--size) solid black; /* Top border creates downward triangle */
      top: 55%; /* Slightly lower than the top triangle */
    }

    /* When a non-empty option is selected, highlight the dropdown */
    .custom-select.select-valid select {
      background-color: #e9f7df;
      border-color: #28a745;
    }

    /*=============  
      Aesthetics  
    ==============*/

    * {
      box-sizing: border-box; /* Makes width/height calculations more intuitive */
    }

    body {
      min-height: 100vh;
      display: grid; /* Enables grid layout */
      place-items: center; /* Centers content horizontally + vertically */
    }
  </style>
</head>

<body>
  <!-- Custom Dropdown Structure -->
  <div class="custom-select">
    <select>
      <option value="">Open this select menu</option>
      <option value="github">GitHub</option>
      <option value="instagram">Instagram</option>
      <option value="facebook">Facebook</option>
      <option value="linkedin">LinkedIn</option>
      <option value="twitter">Twitter</option>
      <option value="reddit">Reddit</option>
    </select>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const selectElement = document.querySelector('select');
      const customSelect = document.querySelector('.custom-select');

      const updateSelectStyles = () => {
        customSelect.classList.toggle('select-valid', selectElement.value !== "");
      };
      selectElement.addEventListener('change', updateSelectStyles);
    });
  </script>
</body>

</html>
