# PostgreSQL connection settings
spring.application.name=potionshop
# localhost can be any address: 7352, 5432, 9000, 4321, etc. are all valid
spring.datasource.url=jdbc:postgresql://localhost:4321/potionshop
spring.datasource.username=connor
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# --- Hibernate schema generation strategy ---
# create-drop: Drop and recreate tables every time the app starts AND stops (data is always wiped)
# create: Drop and recreate tables on startup only (data wiped on each run)
# update: Keep existing data and update schema without dropping tables (best for development)
# validate: Check schema matches entities but make no changes
# none: Do nothing; manage schema manually (best for production)
spring.jpa.hibernate.ddl-auto=create

# Show SQL in the console (useful for debugging)
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true